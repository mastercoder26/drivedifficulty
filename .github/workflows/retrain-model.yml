name: Retrain Route Model

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r ml/requirements.txt

      - name: Export training data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python ml/export_training_data.py || echo "Skipping export when Supabase unavailable"

      - name: Train and evaluate
        run: |
          if [ -f ml/training.csv ]; then
            python ml/train.py --csv ml/training.csv --schema shared/features.schema.json --output ml/artifacts/residual.lgb
          else
            python ml/train.py --schema shared/features.schema.json --output ml/artifacts/residual.lgb
          fi

      - name: Evaluate model gates
        run: |
          if [ -f ml/artifacts/residual.lgb.metrics.json ]; then
            python ml/evaluate.py --metrics ml/artifacts/residual.lgb.metrics.json --max-mae 2.5 || echo "Eval gates not met — review before promoting ONNX"
          fi

      - name: Export ONNX
        run: |
          if [ -f ml/artifacts/residual.lgb ]; then
            python ml/export_onnx.py \
              --model ml/artifacts/residual.lgb \
              --schema shared/features.schema.json \
              --output backend/models/residual_v1.onnx
          fi

      - name: Upload ONNX artifact
        uses: actions/upload-artifact@v4
        with:
          name: residual-onnx
          path: backend/models/residual_v1.onnx
          if-no-files-found: ignore
